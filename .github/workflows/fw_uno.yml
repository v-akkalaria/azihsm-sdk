name: Firmware Uno

on:
  push:
    branches: [ main, dev, fw-main ]
  pull_request:
    branches: [ main, dev, fw-main ]
  merge_group:
    branches: [ main, dev, fw-main ]
  schedule:
    - cron: '0 8 * * *'  # Daily at midnight PST (8 AM UTC)

env:
  CARGO_TERM_COLOR: always
  CACHE_KEY_ID: 84f8acac52412db91407ab9f85776987da17d42f

jobs:
  build_ubuntu:

    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: fw/plat/uno

    steps:
    - uses: actions/checkout@v6

    - name: Restore Cargo cache
      id: cargo-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-${{ env.CACHE_KEY_ID }}

    - name: Setup (full)
      if: steps.cargo-cache.outputs.cache-hit != 'true' 
      run: cargo xtask setup

    - name: Setup (skip-audit)
      if: steps.cargo-cache.outputs.cache-hit == 'true' 
      run: cargo xtask setup --skip-audit

    - name: Run reggen check
      run: cargo xtask precheck --reggen

    - name: Run fmt check
      run: cargo xtask precheck --fmt

    - name: Run clippy check
      run: cargo xtask precheck --clippy

    - name: Run copyright check
      run: cargo xtask precheck --copyright

    - name: Run audit
      run: cargo xtask precheck --audit

    - name: Run build
      run: cargo xtask precheck --build
